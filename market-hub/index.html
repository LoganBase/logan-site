<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Hub — Institutional Dashboard</title>
<style>
:root {
  --bg:       #080c14;
  --surface:  #0d1520;
  --card:     #111827;
  --border:   #1e2d3d;
  --border2:  #243446;
  --text:     #e8edf5;
  --muted:    #64748b;
  --dim:      #94a3b8;
  --green:    #22c55e;
  --green-glow: rgba(34,197,94,.35);
  --yellow:   #f59e0b;
  --yellow-glow: rgba(245,158,11,.35);
  --red:      #ef4444;
  --red-glow: rgba(239,68,68,.35);
  --accent:   #3b82f6;
  --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
}
.header-brand { display: flex; align-items: center; gap: 12px; }
.header-brand h1 { font-size: 16px; font-weight: 700; letter-spacing: .02em; color: var(--text); }
.header-brand .subtitle { font-size: 11px; color: var(--muted); }
.header-meta { display: flex; align-items: center; gap: 12px; }
.refresh-btn {
  background: var(--border2);
  border: 1px solid var(--border);
  color: var(--dim);
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
  transition: all .2s;
  font-family: inherit;
}
.refresh-btn:hover { background: var(--border); color: var(--text); }
.ts { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }

/* ── MAIN LAYOUT ── */
.container { max-width: 1400px; margin: 0 auto; padding: 16px 20px; }

/* ── EXECUTIVE SUMMARY ── */
.exec-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 24px 28px;
  margin-bottom: 16px;
  transition: border-color .4s, box-shadow .4s;
}
.exec-card.glow-green { border-color: var(--green); box-shadow: 0 0 32px var(--green-glow), inset 0 0 60px rgba(34,197,94,.04); }
.exec-card.glow-yellow { border-color: var(--yellow); box-shadow: 0 0 32px var(--yellow-glow), inset 0 0 60px rgba(245,158,11,.04); }
.exec-card.glow-red { border-color: var(--red); box-shadow: 0 0 32px var(--red-glow), inset 0 0 60px rgba(239,68,68,.04); }

.exec-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
.exec-label { font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.exec-title { font-size: 22px; font-weight: 700; letter-spacing: .01em; }
.exec-posture { font-size: 13px; color: var(--dim); margin-top: 4px; }
.exec-score-block { text-align: right; }
.exec-score { font-size: 40px; font-weight: 800; font-family: var(--font-mono); line-height: 1; }
.exec-score.green { color: var(--green); }
.exec-score.yellow { color: var(--yellow); }
.exec-score.red { color: var(--red); }
.exec-score-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

.exec-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.exec-chip {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 12px;
  font-size: 12px; font-weight: 500;
}
.exec-chip .dot { width: 7px; height: 7px; border-radius: 50%; }
.exec-chip .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green-glow); }
.exec-chip .dot.yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow-glow); }
.exec-chip .dot.red { background: var(--red); box-shadow: 0 0 6px var(--red-glow); }

/* ── LOADING STATE ── */
.loading-overlay {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 80px 20px; gap: 16px; color: var(--muted);
}
.spinner {
  width: 32px; height: 32px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 9-CARD GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
@media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }

/* ── SCORE CARD ── */
.score-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color .25s, box-shadow .25s, transform .15s;
}
.score-card:hover { border-color: var(--border2); box-shadow: 0 4px 24px rgba(0,0,0,.4); transform: translateY(-1px); }
.score-card.bullish:hover { border-color: rgba(34,197,94,.4); }
.score-card.bearish:hover { border-color: rgba(239,68,68,.4); }

.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--border);
}
.card-num { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: .1em; }
.card-titles { flex: 1; margin: 0 10px; }
.card-title { font-size: 13px; font-weight: 700; }
.card-subtitle { font-size: 10px; color: var(--muted); margin-top: 1px; }
.status-badge {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 12px;
  font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  white-space: nowrap;
}
.status-badge.bullish { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.25); }
.status-badge.neutral { background: rgba(245,158,11,.10); color: var(--yellow); border: 1px solid rgba(245,158,11,.2); }
.status-badge.bearish { background: rgba(239,68,68,.10); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
.badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.status-badge.bullish .badge-dot { background: var(--green); box-shadow: 0 0 5px var(--green); }
.status-badge.neutral .badge-dot { background: var(--yellow); box-shadow: 0 0 5px var(--yellow); }
.status-badge.bearish .badge-dot { background: var(--red); box-shadow: 0 0 5px var(--red); }

/* ── CARD TABLE ── */
.card-table { width: 100%; border-collapse: collapse; }
.card-table td { padding: 5px 12px; vertical-align: middle; border-bottom: 1px solid rgba(30,45,61,.6); }
.card-table tr:last-child td { border-bottom: none; }
.card-table .col-label { color: var(--muted); font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; width: 90px; white-space: nowrap; }
.card-table .col-indicator { color: var(--dim); font-size: 10px; }
.card-table .col-value { font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--text); text-align: right; white-space: nowrap; }
.card-table .col-condition { font-size: 10px; color: var(--dim); }
.card-table .col-status { text-align: center; width: 24px; }
.jewel { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
.jewel.bullish { background: var(--green); box-shadow: 0 0 6px var(--green); }
.jewel.neutral  { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
.jewel.bearish  { background: var(--red); box-shadow: 0 0 6px var(--red); }

.card-expand-hint { text-align: center; padding: 5px; color: var(--muted); font-size: 10px; border-top: 1px solid var(--border); letter-spacing: .04em; }

/* ── DEEP DIVE MODAL ── */
.modal-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(4,8,16,.85); z-index: 500;
  align-items: center; justify-content: center;
  padding: 20px;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 14px;
  width: 100%; max-width: 820px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 80px rgba(0,0,0,.6);
}
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--card); z-index: 1;
}
.modal-title-block .modal-num { font-size: 11px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }
.modal-title-block .modal-title { font-size: 20px; font-weight: 700; margin-top: 2px; }
.modal-title-block .modal-subtitle { font-size: 12px; color: var(--dim); margin-top: 2px; }
.modal-close {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); width: 32px; height: 32px;
  border-radius: 8px; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; flex-shrink: 0;
}
.modal-close:hover { background: var(--border); color: var(--text); }
.modal-body { padding: 20px 24px 24px; }

.modal-section-title {
  font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 12px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.modal-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
.modal-table th {
  font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted); padding: 0 12px 8px; text-align: left; border-bottom: 1px solid var(--border);
}
.modal-table th:last-child, .modal-table td:last-child { text-align: center; }
.modal-table td {
  padding: 9px 12px; border-bottom: 1px solid rgba(30,45,61,.5);
  vertical-align: middle; font-size: 12px;
}
.modal-table tr:last-child td { border-bottom: none; }
.modal-table .mt-label { font-weight: 600; color: var(--text); }
.modal-table .mt-indicator { color: var(--dim); font-size: 11px; }
.modal-table .mt-value { font-family: var(--font-mono); font-weight: 600; color: var(--text); white-space: nowrap; }
.modal-table .mt-condition { color: var(--dim); font-size: 11px; }

.modal-note {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 16px; font-size: 11px; color: var(--dim); line-height: 1.6;
  margin-top: 4px;
}
.modal-note strong { color: var(--dim); }

/* ── REGIME DEEP DIVE ── */
.regime-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px;
}
.rstat-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px 12px; text-align: center;
}
.rstat-label { font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.rstat-value { font-size: 26px; font-weight: 800; font-family: var(--font-mono); color: var(--text); line-height: 1; }
.rstat-value.positive { color: var(--green); }
.rstat-value.negative { color: var(--red); }
.rstat-sub { font-size: 10px; color: var(--muted); margin-top: 5px; }

.range-selector { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
.range-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); padding: 4px 10px; border-radius: 4px;
  font-size: 10px; font-weight: 600; cursor: pointer;
  font-family: inherit; letter-spacing: .05em; transition: all .15s;
}
.range-btn:hover { background: var(--border); color: var(--text); }
.range-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.chart-wrap { position: relative; height: 210px; }
.rsi-wrap   { position: relative; height: 90px; margin-top: 6px; }

.summary-btn {
  display: block; width: 100%; margin-top: 16px; padding: 10px;
  background: linear-gradient(135deg,rgba(59,130,246,.1),rgba(168,85,247,.1));
  border: 1px solid rgba(59,130,246,.25); border-radius: 8px;
  color: var(--accent); font-size: 12px; cursor: pointer;
  font-family: inherit; transition: all .2s; letter-spacing: .02em;
}
.summary-btn:hover { background: linear-gradient(135deg,rgba(59,130,246,.2),rgba(168,85,247,.2)); border-color: rgba(59,130,246,.5); }
.summary-btn:disabled { opacity: .5; cursor: default; }
.summary-box {
  display: none; margin-top: 14px; padding: 14px 16px;
  background: linear-gradient(135deg,rgba(59,130,246,.07),rgba(168,85,247,.07));
  border: 1px solid rgba(59,130,246,.18); border-radius: 8px;
  font-size: 13px; color: var(--dim); line-height: 1.75;
}
.chart-loading {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; color: var(--muted); font-size: 12px; gap: 10px;
}

/* ── ERROR STATE ── */
.error-state {
  text-align: center; padding: 60px 20px; color: var(--muted);
}
.error-state .err-title { font-size: 16px; font-weight: 600; color: var(--dim); margin-bottom: 8px; }
.error-state .err-msg { font-size: 12px; margin-bottom: 20px; }
.error-state button {
  background: var(--accent); border: none; color: #fff;
  padding: 8px 20px; border-radius: 6px; font-size: 12px;
  cursor: pointer; font-family: inherit;
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-brand">
    <div>
      <h1>Market Hub</h1>
      <div class="subtitle">Systematic Macro Framework — 9-Card Scoring Engine</div>
    </div>
  </div>
  <div class="header-meta">
    <span class="ts" id="ts">—</span>
    <button class="refresh-btn" id="refreshBtn" onclick="refreshAndLoad()">&#8635; Refresh</button>
  </div>
</header>

<div class="container">

  <!-- EXECUTIVE SUMMARY -->
  <div class="exec-card" id="execCard">
    <div class="loading-overlay" id="execLoading">
      <div class="spinner"></div>
      <span>Loading market data…</span>
    </div>
    <div id="execContent" style="display:none">
      <div class="exec-top">
        <div>
          <div class="exec-label">Executive Summary</div>
          <div class="exec-title" id="execLabel">—</div>
          <div class="exec-posture" id="execPosture">—</div>
        </div>
        <div class="exec-score-block">
          <div class="exec-score" id="execScore">—</div>
          <div class="exec-score-sub">Score / 9 Cards</div>
        </div>
      </div>
      <div class="exec-chips" id="execChips"></div>
    </div>
  </div>

  <!-- 9-CARD GRID -->
  <div class="grid" id="grid">
    <div class="loading-overlay" style="grid-column:1/-1">
      <div class="spinner"></div>
    </div>
  </div>

</div>

<!-- DEEP DIVE MODAL -->
<div class="modal-backdrop" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <div class="modal-head">
      <div class="modal-title-block">
        <div class="modal-num" id="mNum">—</div>
        <div class="modal-title" id="mTitle">—</div>
        <div class="modal-subtitle" id="mSubtitle">—</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div id="mBadge"></div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
    </div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>

<script>
let lastData        = null;
let regimeChart     = null;
let rsiChart        = null;
let leadershipChart  = null;
let breadthChart     = null;
let yieldChart       = null;
let sectorsChart     = null;
let commoditiesChart = null;
let chartJsReady     = false;
let currentDeepDive = {};

// ── STATUS HELPERS ────────────────────────────────────────────────────────────
function jewel(status) {
  return `<span class="jewel ${status}"></span>`;
}

function badge(status) {
  const labels = { bullish: 'Bullish', neutral: 'Neutral', bearish: 'Bearish' };
  return `<span class="status-badge ${status}"><span class="badge-dot"></span>${labels[status] || status}</span>`;
}

function fmt(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', timeZoneName: 'short' });
}

// ── RENDER EXEC SUMMARY ───────────────────────────────────────────────────────
function renderExec(agg) {
  const card = document.getElementById('execCard');
  card.className = `exec-card glow-${agg.glow}`;
  document.getElementById('execLabel').textContent   = agg.label;
  document.getElementById('execPosture').textContent = agg.posture;
  const scoreEl = document.getElementById('execScore');
  scoreEl.textContent = agg.score;
  scoreEl.className   = `exec-score ${agg.glow === 'green' ? 'green' : agg.glow === 'yellow' ? 'yellow' : 'red'}`;
  const chips = [
    { color: 'green',  label: `${agg.bullish} Bullish` },
    { color: 'yellow', label: `${agg.neutral} Neutral` },
    { color: 'red',    label: `${agg.bearish} Bearish` },
  ];
  document.getElementById('execChips').innerHTML = chips.map(c =>
    `<div class="exec-chip"><span class="dot ${c.color}"></span>${c.label}</div>`
  ).join('');
  document.getElementById('execLoading').style.display = 'none';
  document.getElementById('execContent').style.display = '';
}

// ── RENDER CARD GRID ──────────────────────────────────────────────────────────
function renderGrid(cards) {
  document.getElementById('grid').innerHTML = cards.map(card => renderCard(card)).join('');
}

function renderCard(card) {
  const rows = (card.rows || []).slice(0, 4).map(row =>
    `<tr>
      <td class="col-label">${row.label}</td>
      <td class="col-indicator">${row.indicator}</td>
      <td class="col-value">${row.value}</td>
      <td class="col-condition">${row.condition}</td>
      <td class="col-status">${jewel(row.status)}</td>
    </tr>`
  ).join('');

  return `
    <div class="score-card ${card.status}" onclick='openModal(${JSON.stringify(card).replace(/'/g, "&#39;")})'>
      <div class="card-header">
        <span class="card-num">${String(card.number).padStart(2, '0')}</span>
        <div class="card-titles">
          <div class="card-title">${card.title}</div>
          <div class="card-subtitle">${card.subtitle}</div>
        </div>
        ${badge(card.status)}
      </div>
      <table class="card-table"><tbody>${rows}</tbody></table>
      <div class="card-expand-hint">Click for deep dive ↗</div>
    </div>`;
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(card) {
  // Destroy any existing chart
  if (regimeChart) { regimeChart.destroy(); regimeChart = null; }

  document.getElementById('mNum').textContent      = `Card ${String(card.number).padStart(2, '0')} of 09`;
  document.getElementById('mTitle').textContent    = card.title;
  document.getElementById('mSubtitle').textContent = card.subtitle;
  document.getElementById('mBadge').innerHTML      = badge(card.status);

  const tableRows = (card.rows || []).map(row =>
    `<tr>
      <td class="mt-label">${row.label}</td>
      <td class="mt-indicator">${row.indicator}</td>
      <td class="mt-value">${row.value}</td>
      <td class="mt-condition">${row.condition}</td>
      <td>${jewel(row.status)}</td>
    </tr>`
  ).join('');

  let extra = '';

  if (card.id === 'regime') {
    const ranges = ['10y','5y','1y','6mo','3mo','1mo','1wk'];
    extra = `
      <div class="modal-section-title" style="margin-top:20px">Historical Context — SPY vs 200d SMA</div>
      <div class="regime-stats">
        <div class="rstat-box">
          <div class="rstat-label">Percentile Rank</div>
          <div class="rstat-value" id="rPercentile">—</div>
          <div class="rstat-sub">of all historical days</div>
        </div>
        <div class="rstat-box">
          <div class="rstat-label">Days in Zone</div>
          <div class="rstat-value" id="rDays">—</div>
          <div class="rstat-sub">consecutive days here</div>
        </div>
        <div class="rstat-box">
          <div class="rstat-label">Extension Velocity</div>
          <div class="rstat-value" id="rRoc">—</div>
          <div class="rstat-sub">10d ROC of stretch</div>
        </div>
      </div>
      <div class="range-selector">
        ${ranges.map(r =>
          `<button class="range-btn${r==='5y'?' active':''}" onclick="loadRegimeChart('${r}')">${r.toUpperCase()}</button>`
        ).join('')}
      </div>
      <div class="chart-wrap">
        <div class="chart-loading" id="chartLoading"><div class="spinner"></div> Loading chart…</div>
        <canvas id="regimeChart" style="display:none"></canvas>
      </div>
      <div class="rsi-wrap">
        <canvas id="rsiChart" style="display:none"></canvas>
      </div>
      <button class="summary-btn" id="summaryBtn" onclick="generateSummary('regime')">✦ Generate AI Summary</button>
      <div class="summary-box" id="summaryBox"></div>`;
  }

  if (card.id === 'leadership') {
    const ranges = ['10y','5y','1y','6mo','3mo','1mo','1wk'];
    extra = `
      <div class="modal-section-title" style="margin-top:20px">Historical Context — Breadth Quality</div>
      <div class="regime-stats">
        <div class="rstat-box">
          <div class="rstat-label">Breadth Signal</div>
          <div class="rstat-value" id="lBreadth">—</div>
          <div class="rstat-sub">RSP vs SPY (period)</div>
        </div>
        <div class="rstat-box">
          <div class="rstat-label">Streak</div>
          <div class="rstat-value" id="lStreak">—</div>
          <div class="rstat-sub" id="lStreakLabel">consecutive days</div>
        </div>
        <div class="rstat-box">
          <div class="rstat-label">Tech Breadth</div>
          <div class="rstat-value" id="lTech">—</div>
          <div class="rstat-sub">QQEW vs QQQ (period)</div>
        </div>

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;

  if (sectorsChart)     { sectorsChart.destroy();     sectorsChart     = null; }

  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── REGIME CHART ──────────────────────────────────────────────────────────────
function loadChartJS() {
  if (chartJsReady) return Promise.resolve();
  return new Promise(resolve => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';
    s.onload = () => { chartJsReady = true; resolve(); };
    document.head.appendChild(s);
  });
}

async function loadRegimeChart(range) {
  // Update active button
  document.querySelectorAll('.range-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase() === range);
  });

  // Reset stats to loading state
  ['rPercentile','rDays','rRoc'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = '…';
  });

  const loadingEl = document.getElementById('chartLoading');
  const canvasEl  = document.getElementById('regimeChart');
  if (loadingEl) loadingEl.style.display = 'flex';
  if (canvasEl)  canvasEl.style.display  = 'none';

  try {
    await loadChartJS();

    const today = new Date().toISOString().slice(0, 10);
    const res  = await fetch(`/api/history?symbol=SPY&range=${range}&d=${today}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const hist = await res.json();
    if (hist.error) throw new Error(hist.error);

    const { dates, closes, sma200, vs200, rsi14, summary } = hist;

    // Update stat boxes
    const pctEl = document.getElementById('rPercentile');
    const dayEl = document.getElementById('rDays');
    const rocEl = document.getElementById('rRoc');

    if (pctEl) {
      const p = summary.percentile;
      pctEl.textContent = p != null ? Math.round(p) + 'th' : '—';
      pctEl.className   = 'rstat-value' + (p >= 80 ? ' negative' : p <= 20 ? ' positive' : '');
    }
    if (dayEl) dayEl.textContent = summary.daysInZone ?? '—';
    if (rocEl) {
      const roc = summary.currentRoc10;
      rocEl.textContent = roc != null ? (roc >= 0 ? '+' : '') + roc.toFixed(1) + '%' : '—';
      rocEl.className   = 'rstat-value' + (roc > 0 ? ' positive' : roc < 0 ? ' negative' : '');
    }

    // Store deep dive context for AI summary
    currentDeepDive = {
      'SPY vs 200d SMA': summary.currentVs200 != null ? (summary.currentVs200 >= 0 ? '+' : '') + summary.currentVs200.toFixed(1) + '%' : '—',
      'Percentile rank': summary.percentile != null ? Math.round(summary.percentile) + 'th percentile of all historical days' : '—',
      'Days in current zone': summary.daysInZone ?? '—',
      'Extension velocity (10d ROC)': summary.currentRoc10 != null ? (summary.currentRoc10 >= 0 ? '+' : '') + summary.currentRoc10.toFixed(1) + '%' : '—',
      'Range shown': range,
    };
    // Reset summary button
    const sBtn = document.getElementById('summaryBtn');
    const sBox = document.getElementById('summaryBox');
    if (sBtn) { sBtn.style.display = 'block'; sBtn.disabled = false; sBtn.textContent = '✦ Generate AI Summary'; }
    if (sBox) sBox.style.display = 'none';

    // Destroy existing chart before redrawing
    if (regimeChart) { regimeChart.destroy(); regimeChart = null; }
    if (loadingEl) loadingEl.style.display = 'none';
    if (canvasEl)  canvasEl.style.display  = 'block';

    // Thin out labels for readability
    const step = Math.max(1, Math.floor(dates.length / 8));
    const labelDates = dates.map((d, i) => i % step === 0 ? d.slice(0, 7) : '');

    regimeChart = new Chart(canvasEl.getContext('2d'), {
      type: 'line',
      data: {
        labels: labelDates,
        datasets: [
          {
            label: 'SPY',
            data: closes,
            borderColor: '#3b82f6',
            borderWidth: 1.5,
            pointRadius: 0,
            fill: false,
            tension: 0,
            segment: {
              borderColor: ctx => {
                const v = vs200?.[ctx.p1DataIndex];
                if (v == null)  return '#3b82f6';
                if (v > 12)     return '#ef4444'; // bullish overextended
                if (v < 0)      return '#f97316'; // below 200d SMA — bearish
                return '#3b82f6';                 // normal bull
              },
            },
          },
          {
            label: '200d SMA',
            data: sma200,
            borderColor: '#f59e0b',
            borderWidth: 1.5,
            borderDash: [5, 3],
            pointRadius: 0,
            fill: false,
            tension: 0,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 250 },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 24, padding: 12 } },
          tooltip: {
            backgroundColor: '#0d1520',
            borderColor: '#1e2d3d',
            borderWidth: 1,
            titleColor: '#64748b',
            bodyColor: '#e8edf5',
            padding: 10,
            callbacks: {
              title: ctx => dates[ctx[0].dataIndex],
              label: ctx => {
                const v = ctx.parsed.y;
                return v != null ? ` ${ctx.dataset.label}: $${v.toFixed(2)}` : null;
              },
              afterBody: ctx => {
                const i = ctx[0]?.dataIndex;
                const stretch = vs200?.[i];
                if (stretch == null) return [];
                const sign = stretch >= 0 ? '+' : '';
                return [` Market Stretch: ${sign}${stretch.toFixed(1)}%`];
              },
            },
          },
        },
        scales: {
          x: {
            ticks: { color: '#64748b', font: { size: 10 }, maxRotation: 0 },
            grid:  { color: 'rgba(30,45,61,.4)' },
          },
          y: {
            ticks: { color: '#64748b', font: { size: 10 }, callback: v => '$' + v.toFixed(0) },
            grid:  { color: 'rgba(30,45,61,.4)' },
          },
        },
      },
    });

    // ── RSI BAR CHART ──────────────────────────────────────────────────────────
    const rsiCanvasEl = document.getElementById('rsiChart');
    if (rsiChart) { rsiChart.destroy(); rsiChart = null; }

    function rsiColor(v) {
      if (v == null) return 'rgba(100,116,139,.3)';
      if (v > 70)   return '#ef4444'; // Overbought
      if (v > 50)   return '#22c55e'; // Bullish Momentum
      if (v > 40)   return '#64748b'; // Neutral
      if (v > 30)   return '#f97316'; // Bearish Momentum
      return '#a855f7';               // Oversold
    }

    if (rsiCanvasEl && rsi14) {
      rsiCanvasEl.style.display = 'block';
      rsiChart = new Chart(rsiCanvasEl.getContext('2d'), {
        type: 'bar',
        data: {
          labels: labelDates,
          datasets: [{
            data: rsi14,
            backgroundColor: rsi14.map(rsiColor),
            borderWidth: 0,
            barPercentage: 1.0,
            categoryPercentage: 1.0,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 250 },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#0d1520',
              borderColor: '#1e2d3d',
              borderWidth: 1,
              titleColor: '#64748b',
              bodyColor: '#e8edf5',
              padding: 8,
              callbacks: {
                title: ctx => dates[ctx[0].dataIndex],
                label: ctx => {
                  const v = ctx.parsed.y;
                  if (v == null) return null;
                  const zone = v > 70 ? 'Overbought' : v > 50 ? 'Bullish Momentum'
                    : v > 40 ? 'Neutral' : v > 30 ? 'Bearish Momentum' : 'Oversold';
                  return ` RSI: ${v.toFixed(1)} — ${zone}`;
                },
              },
            },
          },
          scales: {
            x: { display: false },
            y: {
              min: 0, max: 100,
              ticks: { color: '#64748b', font: { size: 9 }, stepSize: 30 },
              grid:  { color: 'rgba(30,45,61,.4)' },
            },
          },
        },
      });
    }

  } catch (err) {
    if (loadingEl) loadingEl.innerHTML = `<span style="color:var(--red)">Chart unavailable — ${err.message}</span>`;
  }
}

    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    box.textContent  = data.summary;
    box.style.display = 'block';
    btn.style.display = 'none';
  } catch (err) {
    box.textContent   = `Summary unavailable: ${err.message}`;
    box.style.display = 'block';
    btn.disabled      = false;
    btn.textContent   = '✦ Generate AI Summary';
  }
}

// ── DATA LOAD ─────────────────────────────────────────────────────────────────
function showError(msg) {
  document.getElementById('execLoading').innerHTML = '';
  document.getElementById('execCard').innerHTML = `
    <div class="error-state">
      <div class="err-title">Data Unavailable</div>
      <div class="err-msg">${msg}</div>
      <button onclick="loadData()">Try Again</button>
    </div>`;
  document.getElementById('grid').innerHTML = '';
}

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.textContent = '…';
  btn.disabled = true;
  try {
    const res = await fetch('/api/scores');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    lastData = data;
    document.getElementById('ts').textContent = `As of ${fmt(data.timestamp)}`;
    renderExec(data.aggregate);
    renderGrid(data.cards);
  } catch (err) {
    showError(`Could not reach /api/scores — ${err.message}`);
  } finally {
    btn.textContent = '⟳ Refresh';
    btn.disabled = false;
  }
}

async function refreshAndLoad() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  try {
    btn.textContent = '⟳ Updating D1…';
    const rr = await fetch('/api/refresh');
    if (!rr.ok) throw new Error(`Refresh failed: HTTP ${rr.status}`);
    const rd = await rr.json();
    const added = rd.totalAdded ?? 0;
    btn.textContent = added > 0 ? `✓ +${added} rows` : '✓ Up to date';
    await new Promise(r => setTimeout(r, 800));
  } catch (err) {
    btn.textContent = '⚠ Refresh error';
    await new Promise(r => setTimeout(r, 1200));
  } finally {
    btn.textContent = '…';
  }
  await loadData();
}

loadData();
</script>
