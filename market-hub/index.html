<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Hub — Institutional Dashboard</title>
<style>
:root {
  --bg:       #080c14;
  --surface:  #0d1520;
  --card:     #111827;
  --border:   #1e2d3d;
  --border2:  #243446;
  --text:     #e8edf5;
  --muted:    #64748b;
  --dim:      #94a3b8;
  --green:    #22c55e;
  --green-glow: rgba(34,197,94,.35);
  --yellow:   #f59e0b;
  --yellow-glow: rgba(245,158,11,.35);
  --red:      #ef4444;
  --red-glow: rgba(239,68,68,.35);
  --accent:   #3b82f6;
  --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
}
.header-brand { display: flex; align-items: center; gap: 12px; }
.header-brand h1 { font-size: 16px; font-weight: 700; letter-spacing: .02em; color: var(--text); }
.header-brand .subtitle { font-size: 11px; color: var(--muted); }
.header-meta { display: flex; align-items: center; gap: 12px; }
.refresh-btn {
  background: var(--border2);
  border: 1px solid var(--border);
  color: var(--dim);
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
  transition: all .2s;
  font-family: inherit;
}
.refresh-btn:hover { background: var(--border); color: var(--text); }
.ts { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }

/* ── MAIN LAYOUT ── */
.container { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }

/* ── EXECUTIVE SUMMARY ── */
.exec-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 24px 28px;
  margin-bottom: 24px;
  transition: border-color .4s, box-shadow .4s;
}
.exec-card.glow-green { border-color: var(--green); box-shadow: 0 0 32px var(--green-glow), inset 0 0 60px rgba(34,197,94,.04); }
.exec-card.glow-yellow { border-color: var(--yellow); box-shadow: 0 0 32px var(--yellow-glow), inset 0 0 60px rgba(245,158,11,.04); }
.exec-card.glow-red { border-color: var(--red); box-shadow: 0 0 32px var(--red-glow), inset 0 0 60px rgba(239,68,68,.04); }

.exec-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
.exec-label { font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.exec-title { font-size: 22px; font-weight: 700; letter-spacing: .01em; }
.exec-posture { font-size: 13px; color: var(--dim); margin-top: 4px; }
.exec-score-block { text-align: right; }
.exec-score { font-size: 40px; font-weight: 800; font-family: var(--font-mono); line-height: 1; }
.exec-score.green { color: var(--green); }
.exec-score.yellow { color: var(--yellow); }
.exec-score.red { color: var(--red); }
.exec-score-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

.exec-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.exec-chip {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 12px;
  font-size: 12px; font-weight: 500;
}
.exec-chip .dot { width: 7px; height: 7px; border-radius: 50%; }
.exec-chip .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green-glow); }
.exec-chip .dot.yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow-glow); }
.exec-chip .dot.red { background: var(--red); box-shadow: 0 0 6px var(--red-glow); }

/* ── LOADING STATE ── */
.loading-overlay {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 80px 20px; gap: 16px; color: var(--muted);
}
.spinner {
  width: 32px; height: 32px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 9-CARD GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
@media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }

/* ── SCORE CARD ── */
.score-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color .25s, box-shadow .25s, transform .15s;
}
.score-card:hover { border-color: var(--border2); box-shadow: 0 4px 24px rgba(0,0,0,.4); transform: translateY(-1px); }
.score-card.bullish:hover { border-color: rgba(34,197,94,.4); }
.score-card.bearish:hover { border-color: rgba(239,68,68,.4); }

.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
}
.card-num { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: .1em; }
.card-titles { flex: 1; margin: 0 10px; }
.card-title { font-size: 13px; font-weight: 700; }
.card-subtitle { font-size: 10px; color: var(--muted); margin-top: 1px; }
.status-badge {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 12px;
  font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  white-space: nowrap;
}
.status-badge.bullish { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.25); }
.status-badge.neutral { background: rgba(245,158,11,.10); color: var(--yellow); border: 1px solid rgba(245,158,11,.2); }
.status-badge.bearish { background: rgba(239,68,68,.10); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
.badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.status-badge.bullish .badge-dot { background: var(--green); box-shadow: 0 0 5px var(--green); }
.status-badge.neutral .badge-dot { background: var(--yellow); box-shadow: 0 0 5px var(--yellow); }
.status-badge.bearish .badge-dot { background: var(--red); box-shadow: 0 0 5px var(--red); }

/* ── CARD TABLE ── */
.card-table { width: 100%; border-collapse: collapse; }
.card-table td { padding: 7px 14px; vertical-align: top; border-bottom: 1px solid rgba(30,45,61,.6); }
.card-table tr:last-child td { border-bottom: none; }
.card-table .col-label { color: var(--muted); font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; width: 90px; white-space: nowrap; }
.card-table .col-indicator { color: var(--dim); font-size: 10px; }
.card-table .col-value { font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--text); text-align: right; white-space: nowrap; }
.card-table .col-condition { font-size: 10px; color: var(--dim); }
.card-table .col-status { text-align: center; width: 24px; }
.jewel { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
.jewel.bullish { background: var(--green); box-shadow: 0 0 6px var(--green); }
.jewel.neutral  { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
.jewel.bearish  { background: var(--red); box-shadow: 0 0 6px var(--red); }

.card-expand-hint { text-align: center; padding: 8px; color: var(--muted); font-size: 10px; border-top: 1px solid var(--border); letter-spacing: .04em; }

/* ── DEEP DIVE MODAL ── */
.modal-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(4,8,16,.85); z-index: 500;
  align-items: center; justify-content: center;
  padding: 20px;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 14px;
  width: 100%; max-width: 820px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 80px rgba(0,0,0,.6);
}
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--card); z-index: 1;
}
.modal-title-block .modal-num { font-size: 11px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }
.modal-title-block .modal-title { font-size: 20px; font-weight: 700; margin-top: 2px; }
.modal-title-block .modal-subtitle { font-size: 12px; color: var(--dim); margin-top: 2px; }
.modal-close {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); width: 32px; height: 32px;
  border-radius: 8px; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; flex-shrink: 0;
}
.modal-close:hover { background: var(--border); color: var(--text); }
.modal-body { padding: 20px 24px 24px; }

.modal-section-title {
  font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 12px; padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.modal-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
.modal-table th {
  font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted); padding: 0 12px 8px; text-align: left; border-bottom: 1px solid var(--border);
}
.modal-table th:last-child, .modal-table td:last-child { text-align: center; }
.modal-table td {
  padding: 9px 12px; border-bottom: 1px solid rgba(30,45,61,.5);
  vertical-align: middle; font-size: 12px;
}
.modal-table tr:last-child td { border-bottom: none; }
.modal-table .mt-label { font-weight: 600; color: var(--text); }
.modal-table .mt-indicator { color: var(--dim); font-size: 11px; }
.modal-table .mt-value { font-family: var(--font-mono); font-weight: 600; color: var(--text); white-space: nowrap; }
.modal-table .mt-condition { color: var(--dim); font-size: 11px; }

.modal-note {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 16px; font-size: 11px; color: var(--dim); line-height: 1.6;
  margin-top: 4px;
}
.modal-note strong { color: var(--dim); }

/* ── ERROR STATE ── */
.error-state {
  text-align: center; padding: 60px 20px; color: var(--muted);
}
.error-state .err-title { font-size: 16px; font-weight: 600; color: var(--dim); margin-bottom: 8px; }
.error-state .err-msg { font-size: 12px; margin-bottom: 20px; }
.error-state button {
  background: var(--accent); border: none; color: #fff;
  padding: 8px 20px; border-radius: 6px; font-size: 12px;
  cursor: pointer; font-family: inherit;
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-brand">
    <div>
      <h1>Market Hub</h1>
      <div class="subtitle">Systematic Macro Framework — 9-Card Scoring Engine</div>
    </div>
  </div>
  <div class="header-meta">
    <span class="ts" id="ts">—</span>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">&#8635; Refresh</button>
  </div>
</header>

<div class="container">

  <!-- EXECUTIVE SUMMARY -->
  <div class="exec-card" id="execCard">
    <div class="loading-overlay" id="execLoading">
      <div class="spinner"></div>
      <span>Loading market data…</span>
    </div>
    <div id="execContent" style="display:none">
      <div class="exec-top">
        <div>
          <div class="exec-label">Executive Summary</div>
          <div class="exec-title" id="execLabel">—</div>
          <div class="exec-posture" id="execPosture">—</div>
        </div>
        <div class="exec-score-block">
          <div class="exec-score" id="execScore">—</div>
          <div class="exec-score-sub">Score / 9 Cards</div>
        </div>
      </div>
      <div class="exec-chips" id="execChips"></div>
    </div>
  </div>

  <!-- 9-CARD GRID -->
  <div class="grid" id="grid">
    <div class="loading-overlay" style="grid-column:1/-1">
      <div class="spinner"></div>
    </div>
  </div>

</div>

<!-- DEEP DIVE MODAL -->
<div class="modal-backdrop" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <div class="modal-head">
      <div class="modal-title-block">
        <div class="modal-num" id="mNum">—</div>
        <div class="modal-title" id="mTitle">—</div>
        <div class="modal-subtitle" id="mSubtitle">—</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div id="mBadge"></div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
    </div>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>

<script>
let lastData = null;

// ── STATUS HELPERS ────────────────────────────────────────────────────────────
function jewel(status) {
  return `<span class="jewel ${status}"></span>`;
}

function badge(status) {
  const labels = { bullish: 'Bullish', neutral: 'Neutral', bearish: 'Bearish' };
  return `<span class="status-badge ${status}"><span class="badge-dot"></span>${labels[status] || status}</span>`;
}

// ── TIMESTAMP ─────────────────────────────────────────────────────────────────
function fmt(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', timeZoneName: 'short' });
}

// ── RENDER EXEC SUMMARY ───────────────────────────────────────────────────────
function renderExec(agg) {
  const card = document.getElementById('execCard');
  card.className = `exec-card glow-${agg.glow}`;

  document.getElementById('execLabel').textContent   = agg.label;
  document.getElementById('execPosture').textContent = agg.posture;
  const scoreEl = document.getElementById('execScore');
  scoreEl.textContent = agg.score;
  scoreEl.className   = `exec-score ${agg.glow === 'green' ? 'green' : agg.glow === 'yellow' ? 'yellow' : 'red'}`;

  const chips = [
    { color: 'green',  label: `${agg.bullish} Bullish` },
    { color: 'yellow', label: `${agg.neutral} Neutral` },
    { color: 'red',    label: `${agg.bearish} Bearish` },
  ];
  document.getElementById('execChips').innerHTML = chips.map(c =>
    `<div class="exec-chip"><span class="dot ${c.color}"></span>${c.label}</div>`
  ).join('');

  document.getElementById('execLoading').style.display = 'none';
  document.getElementById('execContent').style.display = '';
}

// ── RENDER CARD GRID ──────────────────────────────────────────────────────────
function renderGrid(cards) {
  const grid = document.getElementById('grid');
  grid.innerHTML = cards.map(card => renderCard(card)).join('');
}

function renderCard(card) {
  const rows = (card.rows || []).slice(0, 4).map(row =>
    `<tr>
      <td class="col-label">${row.label}</td>
      <td class="col-indicator">${row.indicator}</td>
      <td class="col-value">${row.value}</td>
      <td class="col-condition">${row.condition}</td>
      <td class="col-status">${jewel(row.status)}</td>
    </tr>`
  ).join('');

  return `
    <div class="score-card ${card.status}" onclick='openModal(${JSON.stringify(card).replace(/'/g, "&#39;")})'>
      <div class="card-header">
        <span class="card-num">${String(card.number).padStart(2, '0')}</span>
        <div class="card-titles">
          <div class="card-title">${card.title}</div>
          <div class="card-subtitle">${card.subtitle}</div>
        </div>
        ${badge(card.status)}
      </div>
      <table class="card-table">
        <tbody>${rows}</tbody>
      </table>
      <div class="card-expand-hint">Click for deep dive ↗</div>
    </div>`;
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(card) {
  document.getElementById('mNum').textContent      = `Card ${String(card.number).padStart(2, '0')} of 09`;
  document.getElementById('mTitle').textContent    = card.title;
  document.getElementById('mSubtitle').textContent = card.subtitle;
  document.getElementById('mBadge').innerHTML      = badge(card.status);

  const rows = card.rows || [];
  const tableRows = rows.map(row =>
    `<tr>
      <td class="mt-label">${row.label}</td>
      <td class="mt-indicator">${row.indicator}</td>
      <td class="mt-value">${row.value}</td>
      <td class="mt-condition">${row.condition}</td>
      <td>${jewel(row.status)}</td>
    </tr>`
  ).join('');

  let extra = '';

  // Global Flows: show full market table
  if (card.id === 'globalflows' && card.details) {
    const detRows = card.details.map(d =>
      `<tr>
        <td class="mt-label">${d.region}</td>
        <td class="mt-indicator">${d.label} (${d.sym})</td>
        <td class="mt-value">${d.value}</td>
        <td class="mt-condition">${d.vs200} vs 200d</td>
        <td>${jewel(d.above ? 'bullish' : 'bearish')}</td>
      </tr>`
    ).join('');
    extra = `
      <div class="modal-section-title" style="margin-top:20px">All Markets — vs 200d SMA</div>
      <table class="modal-table">
        <thead><tr><th>Region</th><th>Market</th><th>Price</th><th>vs 200d</th><th>Signal</th></tr></thead>
        <tbody>${detRows}</tbody>
      </table>`;
  }

  // Commodities: show summary
  if (card.id === 'commodities' && card.summary) {
    extra = `<div class="modal-note"><strong>Summary:</strong> ${card.summary}</div>`;
  }

  // Equities: show summary
  if (card.id === 'equities' && card.summary) {
    extra = `<div class="modal-note"><strong>Summary:</strong> ${card.summary}</div>`;
  }

  // Note (valuations disclaimer)
  if (card.note) {
    extra += `<div class="modal-note" style="margin-top:12px">${card.note}</div>`;
  }

  document.getElementById('mBody').innerHTML = `
    <div class="modal-section-title">Indicators</div>
    <table class="modal-table">
      <thead>
        <tr><th>Signal</th><th>Indicator</th><th>Value</th><th>Condition</th><th>Status</th></tr>
      </thead>
      <tbody>${tableRows}</tbody>
    </table>
    ${extra}`;

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── DATA LOAD ─────────────────────────────────────────────────────────────────
function showError(msg) {
  document.getElementById('execLoading').innerHTML = '';
  document.getElementById('execCard').innerHTML = `
    <div class="error-state">
      <div class="err-title">Data Unavailable</div>
      <div class="err-msg">${msg}</div>
      <button onclick="loadData()">Try Again</button>
    </div>`;
  document.getElementById('grid').innerHTML = '';
}

async function loadData() {
  document.getElementById('refreshBtn').textContent = '…';
  document.getElementById('refreshBtn').disabled = true;

  try {
    const res = await fetch('/api/scores');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    lastData = data;
    document.getElementById('ts').textContent = `As of ${fmt(data.timestamp)}`;
    renderExec(data.aggregate);
    renderGrid(data.cards);
  } catch (err) {
    showError(`Could not reach /api/scores — ${err.message}`);
  } finally {
    document.getElementById('refreshBtn').textContent = '⟳ Refresh';
    document.getElementById('refreshBtn').disabled = false;
  }
}

loadData();
</script>
</body>
</html>
